<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxeltechCloud</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top right, #f1f5f9, #e2e8f0);
            background-attachment: fixed;
            color: #1e293b;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ══ HEADER ══ */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            height: 64px; background: #2563eb;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .logo-icon { background: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; color: white; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-size: 20px; font-weight: bold; color: white; }
        .header-actions { display: flex; align-items: center; gap: 16px; }

        /* ══ BOTÓN DE RETROCESO ══ */
        .btn-back {
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2); border: none;
            width: 36px; height: 36px; border-radius: 8px;
            color: white; cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .btn-back:hover { background: rgba(255,255,255,0.3); transform: translateX(-2px); }
        .btn-back:active { transform: translateX(-4px); }

        .btn { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 9999px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; font-size: 14px; }
        .btn-trash { background: transparent; color: rgba(255,255,255,0.9); }
        .btn-trash:hover { background: rgba(255,255,255,0.1); }
        .btn-trash.active { background: #fee2e2; color: #dc2626; }

        /* ── USER SUBMENU ── */
        .user-menu-container { position: relative; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: #e2e8f0; border: 2px solid rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; color: #1e293b;
            cursor: pointer; user-select: none; transition: all 0.2s;
        }
        .user-avatar:hover { background: #f1f5f9; border-color: white; }
        .user-submenu {
            position: absolute; top: calc(100% + 10px); right: 0;
            background: white; border: 1px solid #e2e8f0;
            border-radius: 14px; box-shadow: 0 12px 28px rgba(0,0,0,0.15);
            padding: 8px; min-width: 220px; z-index: 9999; display: none;
        }
        .user-submenu.visible { display: block; }
        .user-submenu-header { padding: 10px 14px 12px; border-bottom: 1px solid #f1f5f9; margin-bottom: 4px; }
        .user-submenu-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
        .user-submenu-email { font-size: 13px; color: #334155; font-weight: 600; word-break: break-all; }
        .user-submenu-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: none; background: none; width: 100%; text-align: left; cursor: pointer; font-size: 14px; font-weight: 500; color: #dc2626; border-radius: 8px; transition: background 0.15s; }
        .user-submenu-item:hover { background: #fef2f2; }

        /* ══ MAIN ══ */
        .main { padding: 96px 16px 120px; max-width: 1280px; margin: 0 auto; }
        @media (min-width: 640px) { .main { padding: 96px 32px 120px; } }

        .breadcrumbs-section { margin-bottom: 20px; }
        .breadcrumbs-container { display: flex; flex-direction: column; gap: 14px; }
        .breadcrumbs { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .breadcrumb { color: #64748b; cursor: pointer; background: none; border: none; font-size: 14px; }
        .breadcrumb:hover { color: #2563eb; }
        .breadcrumb-current { color: #dc2626; font-weight: 500; font-size: 14px; }
        .actions-bar { display: flex; gap: 8px; flex-wrap: wrap; }

        .btn-nueva-carpeta {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: 9999px;
            background: #dbeafe; color: #1d4ed8;
            border: 1.5px solid #bfdbfe;
            font-weight: 600; font-size: 14px;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-nueva-carpeta:hover { background: #bfdbfe; }

        .btn-upload {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: 9999px;
            background: #2563eb; color: white;
            border: none; font-weight: 600; font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(37,99,235,0.3);
            transition: background 0.2s;
        }
        .btn-upload:hover { background: #1d4ed8; }

        /* ══ GRID ══ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; } }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; border: 2px dashed #e2e8f0; border-radius: 24px; color: #94a3b8; }
        .empty-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
        .empty-text { font-size: 13px; }

        /* ══ ITEM CARD ══ */
        .item-card {
            background: white; border-radius: 16px;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; position: relative; overflow: visible;
        }
        .item-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .item-card.is-dragging { opacity: 0.35; transform: scale(0.96); }
        .item-card.drag-over {
            box-shadow: 0 0 0 3px #2563eb, 0 8px 24px rgba(37,99,235,0.25) !important;
            transform: scale(1.04) !important;
        }
        .item-card.drag-over .item-preview { background: #dbeafe; }

        .item-preview {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            background: #f1f5f9; overflow: hidden; border-radius: 16px 16px 0 0; position: relative;
        }
        .item-preview img { width: 100%; height: 100%; object-fit: cover; }
        .folder-icon { width: 60px; height: 60px; color: #3b82f6; fill: #dbeafe; }

        .item-info { padding: 10px 12px 12px; border-radius: 0 0 16px 16px; }
        .item-header { display: flex; align-items: center; gap: 5px; }
        .item-name { font-size: 13px; font-weight: 500; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }

        .btn-rename { background: none; border: none; cursor: pointer; color: #3b82f6; padding: 3px 4px; border-radius: 5px; display: flex; align-items: center; flex-shrink: 0; transition: background 0.15s; }
        .btn-rename:hover { background: #eff6ff; }

        .btn-restore-item { font-size: 11px; font-weight: 600; color: #2563eb; background: #eff6ff; border: none; border-radius: 6px; padding: 3px 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
        .btn-restore-item:hover { background: #dbeafe; }

        .item-menu-btn { padding: 4px 6px; background: none; border: none; cursor: pointer; color: #cbd5e1; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
        .item-menu-btn:hover { background: #f1f5f9; color: #94a3b8; }

        .select-toggle {
            position: absolute; top: 8px; left: 8px;
            width: 24px; height: 24px; border-radius: 50%;
            border: 2.5px solid white;
            background: rgba(0,0,0,0.3);
            cursor: pointer; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.18s, background 0.15s;
        }
        .item-card:hover .select-toggle { opacity: 0.85; }
        .selection-mode .item-card .select-toggle { opacity: 1; }
        .select-toggle.selected { background: #2563eb; border-color: #2563eb; opacity: 1 !important; }
        .select-toggle.selected::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }

        /* ══ CONTEXT MENU ══ */
        .context-menu { position: fixed; background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); padding: 8px; min-width: 200px; z-index: 1000; display: none; }
        .context-menu.visible { display: block; }
        .context-menu-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border: none; background: none; width: 100%; text-align: left; cursor: pointer; font-size: 14px; color: #475569; border-radius: 6px; }
        .context-menu-item:hover { background: #f1f5f9; }
        .context-menu-item.danger { color: #dc2626; }
        .context-menu-item.danger:hover { background: #fef2f2; }
        .context-menu-item.restore { color: #2563eb; }
        .context-menu-item.restore:hover { background: #eff6ff; }

        /* ══ MODALS ══ */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal.visible { display: flex; }
        .modal-close { position: absolute; top: 24px; right: 24px; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 32px; line-height: 1; }
        .modal-close:hover { color: white; }
        .modal-content { max-width: 1024px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .modal-image { max-height: 80vh; border-radius: 8px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); object-fit: contain; }
        .modal-info { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .modal-title { color: white; font-size: 18px; font-weight: 500; }
        .modal-actions { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
        .btn-modal { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 9999px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-modal:hover { background: rgba(255,255,255,0.2); }
        .btn-modal.danger { background: rgba(220,38,38,0.2); border-color: rgba(220,38,38,0.2); color: #fca5a5; }
        .btn-modal.danger:hover { background: rgba(220,38,38,0.4); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay .modal-box { background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 16px 40px rgba(0,0,0,0.2); }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

        /* Upload overlay */
        .upload-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px); z-index: 150; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .upload-overlay.visible { display: flex; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar { width: 240px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 9999px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s; }

        /* Loading */
        .loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; }
        .loading-spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 16px; border-radius: 8px; margin: 16px; text-align: center; }

        /* ══ AUTH SCREEN ══ */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: radial-gradient(circle at top right, #dbeafe, #e0e7ff, #f1f5f9);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(37,99,235,0.12), 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .auth-header {
            background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 60%, #3b82f6 100%);
            padding: 32px 24px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .auth-app-icon {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .auth-app-name {
            font-size: 22px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }
        .auth-app-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            margin-top: -6px;
        }
        .auth-body {
            padding: 28px 24px 32px;
        }
        .auth-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }
        .auth-fields {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            color: #1e293b;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }
        .auth-input:focus {
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        /* Password wrapper */
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { width: 100%; padding: 12px 44px 12px 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; outline: none; font-size: 14px; font-family: inherit; background: #f8fafc; color: #1e293b; transition: border-color 0.2s, box-shadow 0.2s; }
        .password-wrapper input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .toggle-password { position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: #94a3b8; padding: 4px; display: flex; align-items: center; }
        .toggle-password:hover { color: #475569; }

        /* ══ REMEMBER ME ══ */
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .remember-checkbox {
            width: 17px; height: 17px;
            accent-color: #2563eb;
            cursor: pointer;
            flex-shrink: 0;
            border-radius: 4px;
        }
        .remember-label {
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            user-select: none;
        }

        .btn-auth-submit {
            width: 100%;
            padding: 13px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37,99,235,0.35);
            transition: filter 0.2s, transform 0.1s;
            letter-spacing: 0.2px;
        }
        .btn-auth-submit:hover { filter: brightness(1.08); }
        .btn-auth-submit:active { transform: scale(0.98); }

        .auth-footer {
            text-align: center;
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .auth-footer p { font-size: 13px; color: #64748b; }
        .auth-footer a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
        .auth-link-small { font-size: 12px; color: #94a3b8 !important; }

        /* FIX 3: SELECTION BAR */
        .selection-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 1px solid #e2e8f0;
            padding: 10px 12px;
            display: none; align-items: stretch; justify-content: center;
            gap: 8px;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.08); z-index: 150;
        }
        .selection-bar.visible { display: flex; }

        .btn-sel {
            flex: 1; max-width: 130px;
            padding: 11px 6px; border-radius: 12px;
            border: none; cursor: pointer;
            font-weight: 700; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            color: white; transition: filter 0.15s, opacity 0.15s;
            white-space: nowrap;
        }
        .btn-sel:hover { filter: brightness(1.08); }
        .btn-sel:active { opacity: 0.82; }
        .btn-sel-rename   { background: linear-gradient(135deg, #d97706 0%, #fbbf24 100%); box-shadow: 0 4px 14px rgba(217,119,6,0.35); }
        .btn-sel-download { background: linear-gradient(135deg, #047857 0%, #34d399 100%); box-shadow: 0 4px 14px rgba(4,120,87,0.35); }
        .btn-sel-restore  { background: linear-gradient(135deg, #1d4ed8 0%, #60a5fa 100%); box-shadow: 0 4px 14px rgba(29,78,216,0.35); }
        .btn-sel-delete   { background: linear-gradient(135deg, #b91c1c 0%, #f87171 100%); box-shadow: 0 4px 14px rgba(185,28,28,0.35); }

        /* DRAG GHOST */
        .ghost-drag {
            position: fixed; width: 96px; height: 96px;
            border-radius: 14px; background: white;
            box-shadow: 0 14px 40px rgba(0,0,0,0.35);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; pointer-events: none; z-index: 9999;
            opacity: 0.88; transform: rotate(5deg) scale(1.07);
        }
        .ghost-drag img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- CARGA -->
<div id="loadingScreen" class="loading-screen">
    <div class="loading-spinner"></div>
</div>

<!-- MODAL PERSONALIZADO -->
<div id="customModal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modalTitle" style="margin-bottom:8px;color:#1e293b;font-size:17px;"></h3>
        <p id="modalMessage" style="color:#64748b;font-size:14px;white-space:pre-line;"></p>
        <div id="modalInputContainer" class="hidden" style="margin-top:12px;">
            <input id="modalInput" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;font-family:inherit;">
        </div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" class="hidden"
                style="padding:10px 20px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#475569;font-size:14px;cursor:pointer;font-weight:500;">
                Cancelar
            </button>
            <button id="modalConfirmBtn"
                style="padding:10px 24px;border-radius:8px;border:none;background:#2563eb;color:white;font-size:14px;cursor:pointer;font-weight:600;">
                Aceptar
            </button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════
     AUTH — con ícono de app y casilla recordar
══════════════════════════════════════════════ -->
<div id="authScreen" class="hidden">
    <div class="auth-container">
        <div class="auth-card">

            <!-- Encabezado con ícono y nombre de la app -->
            <div class="auth-header">
                <div class="auth-app-icon">
                    <!-- Ícono nube con flecha de subida -->
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 16 12 12 8 16"/>
                        <line x1="12" y1="12" x2="12" y2="21"/>
                        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                    </svg>
                </div>
                <span class="auth-app-name">AxeltechCloud</span>
                <span class="auth-app-subtitle">Tu almacenamiento personal</span>
            </div>

            <!-- Cuerpo del formulario -->
            <div class="auth-body">
                <h2 class="auth-title" id="authTitle">Iniciar Sesión</h2>

                <div class="auth-fields">
                    <input type="email" id="authEmail" class="auth-input" placeholder="Correo electrónico">

                    <div class="password-wrapper">
                        <input type="password" id="authPassword" placeholder="Contraseña">
                        <button type="button" id="togglePasswordBtn" class="toggle-password">
                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>

                    <!-- ══ CASILLA MANTENER SESIÓN ══ -->
                    <div class="remember-row">
                        <input type="checkbox" id="rememberMe" class="remember-checkbox">
                        <label for="rememberMe" class="remember-label">Mantener sesión iniciada</label>
                    </div>

                    <button class="btn-auth-submit" id="mainAuthBtn">Entrar</button>
                </div>

                <div class="auth-footer">
                    <p id="toggleAuthText">
                        ¿No tienes cuenta?
                        <a href="#" id="toggleAuthLink">Regístrate</a>
                    </p>
                    <p>
                        <a href="#" id="resetPasswordLink" class="auth-link-small">Olvidé mi contraseña</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- APP -->

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────
const SUPABASE_URL      = window.SUPABASE_CONFIG?.url;
const SUPABASE_ANON_KEY = window.SUPABASE_CONFIG?.key;

if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.getElementById('loadingScreen').innerHTML =
        '<div class="error-message"><strong>Error de Configuración</strong><br>No se encontraron las credenciales de Supabase.</div>';
    throw new Error('Faltan credenciales de Supabase');
}
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
        persistSession: true,      // Supabase ya guarda la sesión en localStorage
        autoRefreshToken: true
    }
});

// ─── ESTADO ────────────────────────────────────────────────────────────
let user               = null;
let items              = [];
let currentFolderId    = 'root';
let currentView        = 'browser';
let currentPreviewItem = null;
let isSignUpMode       = false;
let isSelectionMode    = false;
let selectedItems      = new Set();

// ══ HISTORIAL DE NAVEGACIÓN ══
// Cada entrada: { folderId, view }
let navigationHistory  = [];

// ─── BOTÓN ATRÁS ──────────────────────────────────────────────────────
function pushHistory() {
    navigationHistory.push({ folderId: currentFolderId, view: currentView });
    updateBackButton();
}

function goBack() {
    if (navigationHistory.length === 0) return;
    const prev        = navigationHistory.pop();
    currentFolderId   = prev.folderId;
    currentView       = prev.view;
    isSelectionMode   = false;
    selectedItems.clear();
    document.getElementById('selectionBar').classList.remove('visible');
    updateBackButton();
    renderContent();
}

function updateBackButton() {
    const backBtn  = document.getElementById('backBtn');
    const logoIcon = document.getElementById('logoIcon');
    if (navigationHistory.length > 0) {
        backBtn.classList.remove('hidden');
        logoIcon.classList.add('hidden');
    } else {
        backBtn.classList.add('hidden');
        logoIcon.classList.remove('hidden');
    }
}

// ─── REMEMBER ME ──────────────────────────────────────────────────────
const REMEMBER_KEY = 'axeltech_remember_email';

function loadRememberedEmail() {
    const saved = localStorage.getItem(REMEMBER_KEY);
    if (saved) {
        document.getElementById('authEmail').value = saved;
        document.getElementById('rememberMe').checked = true;
    }
}

function saveOrClearRemembered(email) {
    if (document.getElementById('rememberMe').checked) {
        localStorage.setItem(REMEMBER_KEY, email);
    } else {
        localStorage.removeItem(REMEMBER_KEY);
    }
}

// ─── LONG PRESS & DRAG ────────────────────────────────────────────────
const LP_MS  = 500;
const LP_PX  = 8;
let lp = { timer: null, item: null, el: null, x0: 0, y0: 0, fired: false, dragging: false };
let ghost = null;
let desktopDragId = null;

function lpStart(e, item, cardEl) {
    const pt   = e.touches ? e.touches[0] : e;
    lp         = { timer: null, item, el: cardEl, x0: pt.clientX, y0: pt.clientY, fired: false, dragging: false };
    lp.timer   = setTimeout(() => {
        lp.fired = true;
        navigator.vibrate?.(40);
    }, LP_MS);
}

function lpMove(e) {
    if (!lp.item) return;
    const pt   = e.touches ? e.touches[0] : e;
    const dist = Math.hypot(pt.clientX - lp.x0, pt.clientY - lp.y0);
    if (!lp.fired) {
        if (dist > LP_PX) { clearTimeout(lp.timer); lp.item = null; }
        return;
    }
    if (dist > LP_PX && !lp.dragging) {
        lp.dragging = true;
        createGhost(lp.item, pt.clientX, pt.clientY);
        lp.el?.classList.add('is-dragging');
    }
    if (lp.dragging && ghost) {
        if (e.cancelable) e.preventDefault();
        ghost.style.left = `${pt.clientX - 48}px`;
        ghost.style.top  = `${pt.clientY - 48}px`;
        highlightDropTarget(pt.clientX, pt.clientY, lp.item.id);
    }
}

async function lpEnd(e) {
    clearTimeout(lp.timer);
    if (!lp.item) return;
    if (lp.dragging) {
        const pt     = e.changedTouches ? e.changedTouches[0] : e;
        const target = getDropTarget(pt.clientX, pt.clientY, lp.item.id);
        cleanupGhost(lp.el);
        if (target) await moveItemToFolder(lp.item.id, target);
    } else if (lp.fired) {
        if (!isSelectionMode) isSelectionMode = true;
        toggleItemSelection(lp.item.id);
    }
    lp = { timer: null, item: null, el: null, x0: 0, y0: 0, fired: false, dragging: false };
}

function createGhost(item, x, y) {
    ghost = document.createElement('div');
    ghost.className = 'ghost-drag';
    if (item.type === 'folder') {
        ghost.innerHTML = `<svg width="52" height="52" viewBox="0 0 24 24" fill="#dbeafe">
            <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`;
    } else {
        const img = document.createElement('img');
        img.src   = item.imageUrl;
        ghost.appendChild(img);
    }
    ghost.style.left = `${x - 48}px`;
    ghost.style.top  = `${y - 48}px`;
    document.body.appendChild(ghost);
}

function highlightDropTarget(x, y, sourceId) {
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const el = document.elementFromPoint(x, y);
    const fc = el?.closest('[data-drop-folder]');
    if (fc && fc.dataset.dropFolder !== sourceId) fc.classList.add('drag-over');
}

function getDropTarget(x, y, sourceId) {
    const el = document.elementFromPoint(x, y);
    const fc = el?.closest('[data-drop-folder]');
    return (fc && fc.dataset.dropFolder !== sourceId) ? fc.dataset.dropFolder : null;
}

function cleanupGhost(cardEl) {
    ghost?.remove(); ghost = null;
    cardEl?.classList.remove('is-dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

async function moveItemToFolder(itemId, folderId) {
    try {
        const { error } = await supabaseClient.from('gallery_items')
            .update({ parent_id: folderId }).eq('id', itemId);
        if (error) throw error;
        await loadItems();
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

// ─── MODAL ─────────────────────────────────────────────────────────────
function showModal({ title, message, showInput = false, inputType = 'text', onConfirm, showCancel = false }) {
    const modal     = document.getElementById('customModal');
    const inputCont = document.getElementById('modalInputContainer');
    const input     = document.getElementById('modalInput');
    const cancelBtn = document.getElementById('modalCancelBtn');

    document.getElementById('modalTitle').textContent   = title;
    document.getElementById('modalMessage').textContent = message;
    input.value = ''; input.type = inputType;
    input.placeholder = inputType === 'password' ? 'Nueva contraseña' : 'Escribe aquí...';

    showInput  ? inputCont.classList.remove('hidden') : inputCont.classList.add('hidden');
    showCancel ? cancelBtn.classList.remove('hidden')  : cancelBtn.classList.add('hidden');
    modal.classList.remove('hidden');

    const confirmBtn = document.getElementById('modalConfirmBtn');
    confirmBtn.onclick = () => { modal.classList.add('hidden'); onConfirm?.(input.value); };
    cancelBtn.onclick  = () => modal.classList.add('hidden');
    input.onkeydown    = (e) => { if (e.key === 'Enter') confirmBtn.click(); };
}

// ─── PASSWORD TOGGLE ───────────────────────────────────────────────────
function togglePasswordVisibility() {
    const input   = document.getElementById('authPassword');
    const eye     = document.getElementById('eyeIcon');
    const isHide  = input.type === 'password';
    input.type    = isHide ? 'text' : 'password';
    eye.innerHTML = isHide
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

// ─── AUTH ──────────────────────────────────────────────────────────────
function toggleAuthMode() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('authTitle').textContent   = isSignUpMode ? 'Crear Cuenta'  : 'Iniciar Sesión';
    document.getElementById('mainAuthBtn').textContent = isSignUpMode ? 'Registrarse'   : 'Entrar';
    document.getElementById('toggleAuthText').innerHTML = isSignUpMode
        ? '¿Ya tienes cuenta? <a href="#" id="toggleAuthLink" style="color:#2563eb;text-decoration:none;font-weight:600;">Inicia Sesión</a>'
        : '¿No tienes cuenta? <a href="#" id="toggleAuthLink" style="color:#2563eb;text-decoration:none;font-weight:600;">Regístrate</a>';
    document.getElementById('toggleAuthLink').addEventListener('click', e => { e.preventDefault(); toggleAuthMode(); });
}

async function handleAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!email || !password) { showModal({ title: 'Atención', message: 'Por favor, rellena todos los campos.' }); return; }
    try {
        if (isSignUpMode) {
            const { error } = await supabaseClient.auth.signUp({ email, password, options: { emailRedirectTo: location.origin + location.pathname } });
            if (error) throw error;
            showModal({ title: '¡Casi listo!', message: 'Revisa tu correo para confirmar tu cuenta.', onConfirm: () => toggleAuthMode() });
        } else {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            // Guardar o limpiar correo según la casilla
            saveOrClearRemembered(email);
            init();
        }
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

async function resetPassword() {
    const email = document.getElementById('authEmail').value.trim();
    if (!email) { showModal({ title: 'Aviso', message: 'Escribe tu correo primero en el campo de email.' }); return; }
    try {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
        if (error) throw error;
        showModal({ title: '✅ Enviado', message: 'Revisa tu correo para restablecer la contraseña. El link expira en 1 hora.' });
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

async function handleLogout() {
    // Al cerrar sesión limpiamos el correo guardado
    localStorage.removeItem(REMEMBER_KEY);
    await supabaseClient.auth.signOut();
    location.reload();
}

// ─── INIT ──────────────────────────────────────────────────────────────
async function init() {
    try {
        const hashParams  = new URLSearchParams(location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const type        = hashParams.get('type');

        if (accessToken) {
            await supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: hashParams.get('refresh_token') });
            if (type === 'recovery') {
                history.replaceState({}, document.title, location.pathname);
                setTimeout(() => showModal({
                    title: '🔑 Nueva Contraseña', message: 'Ingresa tu nueva clave (mínimo 6 caracteres):',
                    showInput: true, inputType: 'password', showCancel: true,
                    onConfirm: async (newPass) => {
                        if (!newPass || newPass.length < 6) { showModal({ title: 'Error', message: 'La contraseña debe tener al menos 6 caracteres.' }); return; }
                        try {
                            const { error } = await supabaseClient.auth.updateUser({ password: newPass });
                            if (error) throw error;
                            showModal({ title: '✅ Éxito', message: 'Contraseña actualizada.', onConfirm: () => location.reload() });
                        } catch (err) { showModal({ title: 'Error', message: err.message }); }
                    }
                }), 800);
                return;
            }
            history.replaceState({}, document.title, location.pathname);
        }

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
            // Prellenar correo si está guardado
            loadRememberedEmail();
            return;
        }

        user = session.user;
        document.getElementById('userAvatar').textContent      = user.email.substring(0, 2).toUpperCase();
        document.getElementById('userEmailDisplay').textContent = user.email;

        // Resetear historial al entrar
        navigationHistory = [];
        updateBackButton();

        setupRealtime();
        await loadItems();

        document.getElementById('loadingScreen').classList.add('hidden');
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');

        if (type === 'signup') showModal({ title: '¡Bienvenido!', message: 'Cuenta activada con éxito.' });

    } catch (err) {
        console.error(err);
        showModal({ title: 'Error', message: 'Ocurrió un error al inicializar la aplicación.' });
    }
}

function setupRealtime() {
    supabaseClient.channel('gallery_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'gallery_items', filter: `user_id=eq.${user.id}` }, () => loadItems())
        .subscribe();
}

// ─── DATOS ─────────────────────────────────────────────────────────────
async function loadItems() {
    if (!user) return;
    const { data, error } = await supabaseClient
        .from('gallery_items').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
    if (error) { console.error(error); return; }

    items = await Promise.all(data.map(async item => {
        if (item.type === 'image' && item.storage_path) {
            const { data: u } = supabaseClient.storage.from('photos').getPublicUrl(item.storage_path);
            return { ...item, imageUrl: u.publicUrl };
        }
        return item;
    }));
    renderContent();
}

// ─── RENDER ────────────────────────────────────────────────────────────
function renderContent() { renderBreadcrumbs(); renderGrid(); }

function renderBreadcrumbs() {
    const breadcrumbsEl = document.getElementById('breadcrumbs');
    const actionsBar    = document.getElementById('actionsBar');
    const trashBtn      = document.getElementById('trashBtn');

    let html = '<button class="breadcrumb" data-action="goRoot">Mi Unidad</button>';
    getCurrentPath().forEach(f => {
        html += ` <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                  <button class="breadcrumb" data-folder-id="${f.id}">${f.name}</button>`;
    });

    if (currentView === 'trash') {
        html += ` <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                  <span class="breadcrumb-current">Papelera</span>`;
        actionsBar.classList.add('hidden');
        trashBtn.classList.add('active');
    } else {
        actionsBar.classList.remove('hidden');
        trashBtn.classList.remove('active');
    }

    breadcrumbsEl.innerHTML = html;
    breadcrumbsEl.querySelectorAll('[data-action="goRoot"]').forEach(b => b.addEventListener('click', goToRoot));
    breadcrumbsEl.querySelectorAll('[data-folder-id]').forEach(b =>
        b.addEventListener('click', () => navigateToFolder(b.dataset.folderId))
    );
}

function getCurrentPath() {
    const path = []; let cur = currentFolderId;
    while (cur !== 'root') { const f = items.find(i => i.id === cur); if (f) { path.unshift(f); cur = f.parent_id; } else break; }
    return path;
}

function renderItem(item) {
    const ij       = JSON.stringify(item).replace(/"/g, '&quot;');
    const isSel    = selectedItems.has(item.id);
    const isTrash  = currentView === 'trash';

    const preview  = item.type === 'folder'
        ? `<svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`
        : `<img src="${item.imageUrl}" alt="${item.name}" loading="lazy" draggable="false">`;

    const circle   = `<div class="select-toggle ${isSel ? 'selected' : ''}" data-sel="${item.id}"></div>`;

    const pencil   = (!isTrash && !isSelectionMode)
        ? `<button class="btn-rename" data-rename-id="${item.id}" data-rename-name="${item.name.replace(/"/g,'&quot;')}" title="Renombrar">
               <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                   <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                   <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
               </svg>
           </button>` : '';

    const restoreQ = isTrash
        ? `<button class="btn-restore-item" data-restore='${ij}'>Restaurar</button>` : '';

    const menuBtn  = isTrash
        ? `<button class="item-menu-btn" data-menu='${ij}'>⋮</button>` : '';

    const dropAttr = (item.type === 'folder' && !isTrash) ? `data-drop-folder="${item.id}"` : '';
    const dragAttr = !isTrash ? 'draggable="true"' : '';

    return `
        <div class="item-card" data-card-id="${item.id}" ${dropAttr} ${dragAttr}>
            ${circle}
            <div class="item-preview" data-click='${ij}'>${preview}</div>
            <div class="item-info">
                <div class="item-header">
                    <p class="item-name">${item.name}</p>
                    ${pencil}${restoreQ}${menuBtn}
                </div>
            </div>
        </div>`;
}

function renderGrid() {
    const ca    = document.getElementById('contentArea');
    const shown = items.filter(i =>
        currentView === 'trash' ? i.is_deleted : !i.is_deleted && i.parent_id === currentFolderId
    );

    if (!shown.length) {
        ca.innerHTML = `
            <div class="empty-state">
                <p class="empty-title">No hay nada aquí</p>
                <p class="empty-text">${currentView === 'trash' ? 'La papelera está vacía' : 'Mantén presionado un elemento para seleccionarlo'}</p>
            </div>`;
        return;
    }

    ca.innerHTML = `<div class="grid ${isSelectionMode ? 'selection-mode' : ''}">${shown.map(renderItem).join('')}</div>`;

    ca.querySelectorAll('[data-click]').forEach(el => {
        el.addEventListener('click', () => {
            if (lp.fired) return;
            const item = JSON.parse(el.dataset.click);
            if (isSelectionMode) toggleItemSelection(item.id);
            else handleItemClick(item);
        });
    });

    ca.querySelectorAll('[data-sel]').forEach(el => {
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isSelectionMode) isSelectionMode = true;
            toggleItemSelection(el.dataset.sel);
        });
    });

    ca.querySelectorAll('[data-rename-id]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            renameItem(btn.dataset.renameId, btn.dataset.renameName);
        });
    });

    ca.querySelectorAll('[data-restore]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            restoreItem(JSON.parse(btn.dataset.restore));
        });
    });

    ca.querySelectorAll('[data-menu]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            showContextMenu(e, JSON.parse(btn.dataset.menu));
        });
    });

    ca.querySelectorAll('[data-card-id]').forEach(card => {
        const item = items.find(i => i.id === card.dataset.cardId);
        if (!item) return;

        card.addEventListener('touchstart', (e) => lpStart(e, item, card), { passive: true });
        card.addEventListener('touchmove',  lpMove, { passive: false });
        card.addEventListener('touchend',   lpEnd,  { passive: true });
        card.addEventListener('touchcancel', () => {
            clearTimeout(lp.timer);
            cleanupGhost(lp.el);
            lp = { timer:null, item:null, el:null, x0:0, y0:0, fired:false, dragging:false };
        });

        let deskTimer = null;
        card.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            deskTimer = setTimeout(() => {
                if (!isSelectionMode) isSelectionMode = true;
                toggleItemSelection(item.id);
            }, LP_MS);
        });
        card.addEventListener('mouseup',    () => clearTimeout(deskTimer));
        card.addEventListener('mouseleave', () => clearTimeout(deskTimer));

        if (currentView !== 'trash') {
            card.addEventListener('dragstart', (e) => {
                desktopDragId = item.id;
                e.dataTransfer.setData('text/plain', item.id);
                e.dataTransfer.effectAllowed = 'move';
                setTimeout(() => card.classList.add('is-dragging'), 0);
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('is-dragging');
                document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
                desktopDragId = null;
            });

            if (item.type === 'folder') {
                card.addEventListener('dragover', (e) => {
                    if (desktopDragId && desktopDragId !== item.id) {
                        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
                        card.classList.add('drag-over');
                    }
                });
                card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
                card.addEventListener('drop', async (e) => {
                    e.preventDefault(); card.classList.remove('drag-over');
                    const src = e.dataTransfer.getData('text/plain');
                    if (src && src !== item.id) await moveItemToFolder(src, item.id);
                });
            }
        }
    });

    syncSelectionBar();
}

// ─── NAVEGACIÓN (con historial) ────────────────────────────────────────
function handleItemClick(item) {
    if (item.type === 'folder') navigateToFolder(item.id);
    else showPreview(item);
}

function navigateToFolder(id) {
    pushHistory();
    currentFolderId = id;
    currentView     = 'browser';
    cancelSelection();
}

function goToRoot() {
    pushHistory();
    currentFolderId = 'root';
    currentView     = 'browser';
    cancelSelection();
}

function toggleTrash() {
    pushHistory();
    currentView = currentView === 'trash' ? 'browser' : 'trash';
    if (currentView === 'browser') currentFolderId = 'root';
    cancelSelection();
}

// ─── CARPETA / RENAME ──────────────────────────────────────────────────
async function createFolder() {
    showModal({
        title: 'Nueva Carpeta', message: 'Escribe el nombre de la carpeta:', showInput: true, showCancel: true,
        onConfirm: async (name) => {
            if (!name?.trim()) return;
            try {
                const { error } = await supabaseClient.from('gallery_items').insert({ user_id: user.id, name: name.trim(), type: 'folder', parent_id: currentFolderId, is_deleted: false });
                if (error) throw error;
            } catch (err) { showModal({ title: 'Error', message: err.message }); }
        }
    });
}

async function renameItem(itemId, currentName) {
    showModal({
        title: 'Renombrar', message: `Nuevo nombre para "${currentName}":`,
        showInput: true, showCancel: true,
        onConfirm: async (newName) => {
            if (!newName?.trim() || newName.trim() === currentName) return;
            try {
                const { error } = await supabaseClient.from('gallery_items').update({ name: newName.trim() }).eq('id', itemId);
                if (error) throw error;
            } catch (err) { showModal({ title: 'Error', message: err.message }); }
        }
    });
}

// ─── SUBIDA ────────────────────────────────────────────────────────────
async function handleFileUpload(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length || !user) return;

    const overlay = document.getElementById('uploadOverlay');
    const pFill   = document.getElementById('progressFill');
    const pStatus = document.getElementById('uploadStatus');
    overlay.classList.add('visible');

    let ok = 0, fail = 0;
    for (let i = 0; i < files.length; i++) {
        const f = files[i];
        pStatus.textContent = `${i+1} de ${files.length}`;
        pFill.style.width   = `${((i+1)/files.length)*100}%`;
        try {
            const path = `${user.id}/${Date.now()}_${Math.random().toString(36).slice(2)}_${f.name}`;
            const { error: e1 } = await supabaseClient.storage.from('photos').upload(path, f);
            if (e1) throw e1;
            const { error: e2 } = await supabaseClient.from('gallery_items').insert({
                user_id: user.id, name: f.name, type: 'image', parent_id: currentFolderId, storage_path: path, is_deleted: false
            });
            if (e2) throw e2;
            ok++;
        } catch (err) { console.error(err); fail++; }
    }

    overlay.classList.remove('visible');
    pFill.style.width = '0%'; pStatus.textContent = '0 de 0'; e.target.value = '';

    if (fail) showModal({ title: 'Subida con errores', message: `✅ ${ok} subidos\n❌ ${fail} fallaron` });
    else if (ok) showModal({ title: '✅ Éxito', message: `${ok} archivo${ok>1?'s':''} subido${ok>1?'s':''} correctamente.` });
}

// ─── CONTEXT MENU ──────────────────────────────────────────────────────
function showContextMenu(ev, item) {
    const menu = document.getElementById('contextMenu');
    menu.style.left = `${Math.min(ev.clientX, window.innerWidth - 220)}px`;
    menu.style.top  = `${Math.min(ev.clientY, window.innerHeight - 100)}px`;
    menu.innerHTML  = `
        <button class="context-menu-item restore" data-a="restore">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            Restaurar
        </button>
        <button class="context-menu-item danger" data-a="perm">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Eliminar permanentemente
        </button>`;
    menu.classList.add('visible');
    menu.querySelectorAll('[data-a]').forEach(b => {
        b.addEventListener('click', async () => {
            menu.classList.remove('visible');
            if (b.dataset.a === 'restore') await restoreItem(item);
            else await deletePermanently(item);
        });
    });
    setTimeout(() => document.addEventListener('click', () => menu.classList.remove('visible'), { once: true }), 10);
}

// ─── OPERACIONES ───────────────────────────────────────────────────────
async function moveToTrash(item) {
    try {
        const { error } = await supabaseClient.from('gallery_items').update({ is_deleted: true }).eq('id', item.id);
        if (error) throw error;
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

async function restoreItem(item) {
    try {
        const { error } = await supabaseClient.from('gallery_items').update({ is_deleted: false }).eq('id', item.id);
        if (error) throw error;
        showModal({ title: '✅ Restaurado', message: 'El elemento ha sido restaurado.' });
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

async function deletePermanently(item) {
    showModal({
        title: '⚠️ Confirmar', message: '¿Eliminar permanentemente? No se puede deshacer.', showCancel: true,
        onConfirm: async () => {
            try {
                if (item.storage_path) await supabaseClient.storage.from('photos').remove([item.storage_path]);
                const { error } = await supabaseClient.from('gallery_items').delete().eq('id', item.id);
                if (error) throw error;
                showModal({ title: '✅ Eliminado', message: 'Elemento eliminado permanentemente.' });
            } catch (err) { showModal({ title: 'Error', message: err.message }); }
        }
    });
}

// ─── PREVIEW ───────────────────────────────────────────────────────────
function showPreview(item) {
    currentPreviewItem = item;
    document.getElementById('previewImage').src          = item.imageUrl;
    document.getElementById('previewTitle').textContent  = item.name;
    document.getElementById('previewModal').classList.add('visible');
}
function closePreview() { document.getElementById('previewModal').classList.remove('visible'); currentPreviewItem = null; }

async function downloadCurrentImage() {
    if (!currentPreviewItem) return;
    try {
        const r = await fetch(currentPreviewItem.imageUrl);
        const b = await r.blob();
        const u = URL.createObjectURL(b);
        const a = document.createElement('a');
        a.href = u; a.download = currentPreviewItem.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
    } catch { showModal({ title: 'Error', message: 'No se pudo descargar la imagen.' }); }
}

async function deleteCurrentImage() {
    if (!currentPreviewItem) return;
    closePreview();
    await moveToTrash(currentPreviewItem);
}

// ─── SELECCIÓN ─────────────────────────────────────────────────────────
function cancelSelection() {
    isSelectionMode = false;
    selectedItems.clear();
    document.getElementById('selectionBar').classList.remove('visible');
    renderContent();
}

function toggleItemSelection(itemId) {
    if (selectedItems.has(itemId)) selectedItems.delete(itemId);
    else selectedItems.add(itemId);
    updateSelectionUI();
}

function updateSelectionUI() {
    const count = selectedItems.size;
    if (count > 0) document.getElementById('selectionBar').classList.add('visible');
    else { document.getElementById('selectionBar').classList.remove('visible'); isSelectionMode = false; }
    syncSelectionBar();
    renderGrid();
}

function syncSelectionBar() {
    const isTrash = currentView === 'trash';
    document.getElementById('renameSelectedBtn').classList.toggle('hidden', isTrash);
    document.getElementById('downloadSelectedBtn').classList.toggle('hidden', isTrash);
    document.getElementById('restoreSelectedBtn').classList.toggle('hidden', !isTrash);
}

async function renameSelected() {
    if (selectedItems.size === 0) return;
    if (selectedItems.size > 1) { showModal({ title: 'Aviso', message: 'Selecciona un solo elemento para renombrar.' }); return; }
    const id   = Array.from(selectedItems)[0];
    const item = items.find(i => i.id === id);
    if (!item) return;
    cancelSelection();
    setTimeout(() => renameItem(id, item.name), 100);
}

async function downloadSelectedItems() {
    if (!selectedItems.size) return;
    const imgs = items.filter(i => selectedItems.has(i.id) && i.type === 'image');
    if (!imgs.length) { showModal({ title: 'Aviso', message: 'Solo se pueden descargar imágenes.' }); return; }
    for (const item of imgs) {
        try {
            const r = await fetch(item.imageUrl);
            const b = await r.blob();
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = item.name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
            await new Promise(r => setTimeout(r, 100));
        } catch (e) { console.error(e); }
    }
    showModal({ title: '✅ Éxito', message: `${imgs.length} imagen(es) descargada(s).` });
}

async function restoreSelectedItems() {
    if (!selectedItems.size) return;
    try {
        for (const id of selectedItems)
            await supabaseClient.from('gallery_items').update({ is_deleted: false }).eq('id', id);
        showModal({ title: '✅ Restaurado', message: `${selectedItems.size} elemento(s) restaurado(s).` });
        cancelSelection();
    } catch (err) { showModal({ title: 'Error', message: err.message }); }
}

async function deleteSelectedItems() {
    if (!selectedItems.size) return;
    const isTrash = currentView === 'trash';
    showModal({
        title: '⚠️ Confirmar',
        message: isTrash ? `¿Eliminar permanentemente ${selectedItems.size} elemento(s)?`
                         : `¿Mover ${selectedItems.size} elemento(s) a la papelera?`,
        showCancel: true,
        onConfirm: async () => {
            try {
                for (const id of selectedItems) {
                    if (isTrash) {
                        const item = items.find(i => i.id === id);
                        if (item?.storage_path) await supabaseClient.storage.from('photos').remove([item.storage_path]);
                        await supabaseClient.from('gallery_items').delete().eq('id', id);
                    } else {
                        await supabaseClient.from('gallery_items').update({ is_deleted: true }).eq('id', id);
                    }
                }
                showModal({ title: '✅ Listo', message: `${selectedItems.size} elemento(s) ${isTrash ? 'eliminado(s) permanentemente' : 'enviado(s) a la papelera'}.` });
                cancelSelection();
            } catch (err) { showModal({ title: 'Error', message: err.message }); }
        }
    });
}

// ─── EVENT LISTENERS ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    // Auth
    document.getElementById('mainAuthBtn').addEventListener('click', handleAuth);
    document.getElementById('toggleAuthLink').addEventListener('click', e => { e.preventDefault(); toggleAuthMode(); });
    document.getElementById('resetPasswordLink').addEventListener('click', e => { e.preventDefault(); resetPassword(); });
    document.getElementById('authPassword').addEventListener('keypress', e => { if (e.key === 'Enter') handleAuth(); });
    document.getElementById('togglePasswordBtn').addEventListener('click', togglePasswordVisibility);

    // Navegación
    document.getElementById('backBtn').addEventListener('click', (e) => { e.stopPropagation(); goBack(); });
    document.getElementById('logoBtn').addEventListener('click', goToRoot);
    document.getElementById('trashBtn').addEventListener('click', toggleTrash);
    document.getElementById('createFolderBtn').addEventListener('click', createFolder);
    document.getElementById('fileInput').addEventListener('change', handleFileUpload);

    // Menú usuario
    document.getElementById('userAvatar').addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('userSubmenu').classList.toggle('visible');
    });
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);
    document.addEventListener('click', () => document.getElementById('userSubmenu')?.classList.remove('visible'));

    // Preview
    document.getElementById('closePreviewBtn').addEventListener('click', closePreview);
    document.getElementById('downloadBtn').addEventListener('click', downloadCurrentImage);
    document.getElementById('deleteImageBtn').addEventListener('click', deleteCurrentImage);

    // Barra de selección
    document.getElementById('renameSelectedBtn').addEventListener('click', renameSelected);
    document.getElementById('downloadSelectedBtn').addEventListener('click', downloadSelectedItems);
    document.getElementById('restoreSelectedBtn').addEventListener('click', restoreSelectedItems);
    document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelectedItems);

    init();
});
</script>
